services:
  - type: web
    name: schemestealer-api
    runtime: python
    rootDir: python-api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --forwarded-allow-ips="*" --bind 0.0.0.0:$PORT --timeout 300
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CUDA_VISIBLE_DEVICES
        value: ""
      - key: OMP_NUM_THREADS
        value: "1"
      - key: ORT_DISABLE_PROVIDERS
        value: "TensorrtExecutionProvider,CUDAExecutionProvider,MIGraphXExecutionProvider"
